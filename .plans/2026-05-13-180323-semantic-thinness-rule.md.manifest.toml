plan = ".plans/2026-05-13-180323-semantic-thinness-rule.md"
manifest_version = 1
supersedes = [".plans/2026-05-13-172644-semantic-thinness-pattern-data.md"]

[package]
path = "packages/textlint-rules"
name = "@prosesmasher/textlint-rules"
type = "module"
private = true

[rule]
id = "semantic-thinness"
family = "semantic-thinness"
path = "packages/textlint-rules/src/families/semantic-thinness/semantic-thinness.ts"
registry_path = "packages/textlint-rules/src/registries/semantic-thinness.ts"
private_matcher_path = "packages/textlint-rules/src/families/semantic-thinness/private/pattern-matcher.ts"
export_key = "./families/semantic-thinness/semantic-thinness"
export_value = "./dist/families/semantic-thinness/semantic-thinness.js"
message_substring = "Semantic thinness ("
message_parts = ["match.purpose", "match.signal"]

[pattern_inventory]
root = "packages/textlint-rules/src/families/semantic-thinness/patterns"
closed = true
required_fields = [
  "id",
  "class",
  "purpose",
  "templates",
  "slots",
  "rejectIf",
  "positiveExamples",
  "negativeExamples",
  "notes",
]
required_string_fields = ["id", "class", "purpose"]
required_list_fields = [
  "templates",
  "rejectIf",
  "positiveExamples",
  "negativeExamples",
  "notes",
]
required_object_fields = ["slots"]
min_templates = 1
min_slot_groups = 1
min_values_per_slot = 1
min_positive_examples = 1
min_negative_examples = 1

[behavior_fixture]
path = "behavior/fixtures/textlint-rules/semantic-thinness/family.md"
config = "behavior/fixtures/textlint-rules/semantic-thinness/.textlintrc.json"
metadata = "behavior/fixtures/textlint-rules/semantic-thinness/fixture.toml"
rulesdir = "packages/textlint-rules/dist/families/semantic-thinness"
min_findings = 10
required_rule_id = "semantic-thinness"

