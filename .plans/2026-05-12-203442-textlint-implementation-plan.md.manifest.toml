plan = ".plans/2026-05-12-203442-textlint-implementation-plan.md"
manifest_version = 1

[package]
path = "packages/textlint-rules"
name = "@prosesmasher/textlint-rules"
type = "module"
private = true

runtime_dependencies = [
  "@lunarisapp/readability",
  "@textlint/types",
  "sentence-splitter",
  "textlint",
  "textlint-rule-helper",
  "textlint-util-to-string",
]

dev_dependencies = [
  "@typescript-eslint/eslint-plugin",
  "@typescript-eslint/parser",
  "eslint",
  "typescript",
]

forbidden_dependencies = [
  "escape-string-regexp",
  "natural",
  "nlcst-search",
  "retext-english",
  "retext-equality",
  "retext-readability",
  "retext-simplify",
  "split-string-words",
]

[g3ts]
config_path = "packages/textlint-rules/guardrail3-ts.toml"
required = true
run_on_package = "packages/textlint-rules"

